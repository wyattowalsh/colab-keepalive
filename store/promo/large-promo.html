<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colab Keepalive - Large Promo (1400x560)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1400px;
        height: 560px;
        background: linear-gradient(
          135deg,
          #0d47a1 0%,
          #1a73e8 50%,
          #64b5f6 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
        overflow: hidden;
      }
      .container {
        display: flex;
        align-items: center;
        gap: 80px;
        padding: 60px;
      }
      .left {
        flex: 1;
        max-width: 600px;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: white;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 30px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      .icon svg {
        width: 50px;
        height: 50px;
        fill: #1a73e8;
      }
      h1 {
        font-size: 56px;
        font-weight: 800;
        margin-bottom: 16px;
        text-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        line-height: 1.1;
      }
      .tagline {
        font-size: 24px;
        opacity: 0.95;
        margin-bottom: 30px;
        font-weight: 400;
      }
      .features {
        display: flex;
        gap: 24px;
      }
      .feature {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.15);
        padding: 10px 20px;
        border-radius: 8px;
      }
      .feature-dot {
        width: 8px;
        height: 8px;
        background: #4caf50;
        border-radius: 50%;
      }
      .right {
        width: 500px;
        height: 400px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 30px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .mockup-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .mockup-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
      }
      .mockup-title {
        font-size: 14px;
        opacity: 0.7;
      }
      .mockup-content {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .mockup-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
      }
      .mockup-icon {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .mockup-text {
        flex: 1;
      }
      .mockup-label {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .mockup-sublabel {
        font-size: 12px;
        opacity: 0.7;
      }
      .mockup-status {
        padding: 6px 14px;
        background: #4caf50;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </div>
        <h1>Keep Your Colab<br />Sessions Alive</h1>
        <p class="tagline">Privacy-first · Smart · Automatic</p>
        <div class="features">
          <div class="feature">
            <div class="feature-dot"></div>
            Privacy First
          </div>
          <div class="feature">
            <div class="feature-dot"></div>
            Scheduled
          </div>
          <div class="feature">
            <div class="feature-dot"></div>
            Multi-Tab
          </div>
        </div>
      </div>
      <div class="right">
        <div class="mockup-header">
          <div class="mockup-dot"></div>
          <div class="mockup-dot"></div>
          <div class="mockup-dot"></div>
          <div class="mockup-title">Colab Keepalive</div>
        </div>
        <div class="mockup-content">
          <div class="mockup-row">
            <div class="mockup-icon">📊</div>
            <div class="mockup-text">
              <div class="mockup-label">Watching 3 tabs</div>
              <div class="mockup-sublabel">Next click in 45s</div>
            </div>
            <div class="mockup-status">Active</div>
          </div>
          <div class="mockup-row">
            <div class="mockup-icon">⏱️</div>
            <div class="mockup-text">
              <div class="mockup-label">Uptime: 2h 34m</div>
              <div class="mockup-sublabel">Total clicks: 156</div>
            </div>
          </div>
          <div class="mockup-row">
            <div class="mockup-icon">🛡️</div>
            <div class="mockup-text">
              <div class="mockup-label">Privacy Mode</div>
              <div class="mockup-sublabel">Zero data collection</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
